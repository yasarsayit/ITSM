<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Resim Galerisi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9f9f9;
            padding: 15px;
            margin: 0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            background: #fff;
            border: 1px solid #ddd;
            padding: 8px;
            cursor: pointer;
            text-align: center;
            border-radius: 8px;
            transition: all 0.2s;
            position: relative;
        }

            .gallery-item:hover {
                border-color: #0056b3;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                transform: scale(1.02);
            }

            .gallery-item img {
                width: 100%;
                height: 90px;
                object-fit: cover;
                border-radius: 4px;
            }

            .gallery-item p {
                margin: 8px 0 0;
                font-size: 11px;
                color: #555;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 6px;
            cursor: pointer;
            display: none;
            z-index: 10;
        }

        .gallery-item:hover .delete-btn {
            display: block;
        }

        .delete-btn:hover {
            background: red;
            transform: scale(1.1);
        }

        .empty-msg {
            text-align: center;
            color: #777;
            margin-top: 50px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="gallery-grid" id="grid">Images are loading...</div>

    <script>
        function loadImages() {
            fetch('ImageList.ashx')
                .then(response => response.json())
                .then(data => {
                    const grid = document.getElementById('grid');
                    grid.innerHTML = '';
                    if (data.length === 0) {
                        grid.innerHTML = '<div class="empty-msg">No pictures have been uploaded yet.</div>';
                        return;
                    }

                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'gallery-item';
                        div.onclick = function (e) {
                            if (!e.target.closest('.delete-btn')) {
                                window.parent.postMessage({
                                    mceAction: 'gorselSecildi',
                                    url: item.value,
                                    title: item.title
                                }, '*');
                            }
                        };

                        div.innerHTML = `
                                <button class="delete-btn" onclick="deleteImage('${item.value}', event)">
                                    <i class="fas fa-trash"></i>
                                </button>
                                <img src="${item.value}" alt="${item.title}" />
                                <p>${item.title}</p>`;
                        grid.appendChild(div);
                    });
                })
                .catch(err => {
                    document.getElementById('grid').innerHTML = 'An error occurred while uploading the images.';
                });
        }

        function deleteImage(url, event) {
            event.stopPropagation();

            if (confirm('Are you sure you want to permanently delete this image?')) {
                fetch('ImageDelete.ashx?fileUrl=' + encodeURIComponent(url))
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            loadImages();
                        } else {
                            alert('Error: ' + data.message);
                        }
                    })
                    .catch(err => alert('An error occurred during the deletion process.'));
            }
        }

        loadImages();
    </script>
</body>
</html>
